name: beta-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows installer (.msi)
            task: ':composeApp:packageMsi'
            artifact_name: msi
            artifact_path: composeApp/build/compose/binaries/main/msi/*.msi
          - os: macos-latest
            name: macOS installer (.dmg)
            task: ':composeApp:packageDmg'
            artifact_name: dmg
            artifact_path: composeApp/build/compose/binaries/main/dmg/*.dmg
          - os: ubuntu-latest
            name: Android APK
            task: ':composeApp:assembleDebug'
            artifact_name: apk
            artifact_path: composeApp/build/outputs/apk/debug/*.apk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # jpackage's MSI backend invokes WiX 3 (candle.exe/light.exe); put its bin on PATH.
      - name: Add WiX 3 to PATH
        if: matrix.artifact_name == 'msi'
        shell: pwsh
        run: |
          $wix = Get-ChildItem 'C:\Program Files (x86)' -Filter 'WiX Toolset v3*' -Directory | Select-Object -First 1
          if ($wix) { Add-Content -Path $env:GITHUB_PATH -Value "$($wix.FullName)\bin" }

      - name: Build
        shell: bash
        run: ./gradlew ${{ matrix.task }} --stacktrace
        env:
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: true
