<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GamesLibrary</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<style>
  html,body{height:100%;margin:0}
  body{display:flex;align-items:center;justify-content:center;
    background:#0a0f17;color:#e7ecf3;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  .card{text-align:center;padding:40px 32px}
  h1{font-size:20px;margin:18px 0 6px;font-weight:600}
  p{margin:0;color:#8b97a8;font-size:14px}
</style>
</head>
<body>
<div class="card">
  <h1 id="title">Returning to the app&hellip;</h1>
  <p id="detail">Completing Steam sign-in with GamesLibrary.</p>
  <noscript><p>JavaScript is required to finish Steam sign-in.</p></noscript>
</div>
<script>
  // Forwards Steam's OpenID callback to the app's loopback listener on the port
  // named in the query, passing the full query string through verbatim.
  var raw = new URLSearchParams(location.search).get("port");
  var port = /^\d{4,5}$/.test(raw) ? parseInt(raw, 10) : NaN;
  if (port >= 1024 && port <= 65535) {
    location.replace("http://127.0.0.1:" + port + "/callback" + location.search);
  } else {
    document.getElementById("title").textContent = "This page is part of GamesLibrary";
    document.getElementById("detail").textContent =
      "It hands Steam sign-in back to the app and can’t be used on its own.";
  }
</script>
</body>
</html>
